<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BINGO MODZ - AUTH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#ff4655;
--bg:#0a0a0f;
--card:#12121a;
--text:#fff;
--secondary:#00d4ff;
}

body{
margin:0;
font-family:'Rajdhani';
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.box{
width:360px;
background:var(--card);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

h2{
font-family:'Orbitron';
text-align:center;
color:var(--primary);
}

input{
width:100%;
padding:12px;
margin:8px 0;
background:#1a1a25;
border:1px solid #333;
color:white;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#ff4655,#ff8a00);
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.toggle{
text-align:center;
margin-top:10px;
color:var(--secondary);
cursor:pointer;
font-size:14px;
}

/* POPUP */
.modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.7);
display: none;
justify-content: center;
align-items: center;
z-index: 9999;
}

.modal-box {
background: #12121a;
border: 1px solid rgba(255,70,85,0.3);
padding: 25px;
border-radius: 15px;
text-align: center;
width: 300px;
animation: pop 0.3s ease;
box-shadow: 0 0 20px rgba(255,70,85,0.2);
}

.modal-title {
font-family: 'Orbitron';
font-size: 1.2rem;
margin-bottom: 10px;
color: #ff4655;
}

.modal-text {
color: #a0a0b0;
margin-bottom: 15px;
}

.modal-btn {
background: linear-gradient(135deg,#ff4655,#ff8a00);
border: none;
padding: 10px 20px;
border-radius: 10px;
color: white;
cursor: pointer;
font-weight: bold;
}

@keyframes pop {
from {transform: scale(0.7); opacity: 0;}
to {transform: scale(1); opacity: 1;}
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">LOGIN</h2>

<!-- LOGIN -->
<div id="loginForm">
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
<div class="toggle" onclick="showRegister()">Create new account</div>
</div>

<!-- REGISTER -->
<div id="registerForm" style="display:none;">
<input type="text" id="regUser" placeholder="Username">
<input type="email" id="regEmail" placeholder="Gmail">
<input type="password" id="regPass" placeholder="Password">
<button onclick="register()">Register</button>
<div class="toggle" onclick="showLogin()">Already have account?</div>
</div>

</div>

<!-- POPUP -->
<div class="modal" id="popup">
    <div class="modal-box">
        <div class="modal-title" id="popupTitle">Message</div>
        <div class="modal-text" id="popupText">Text</div>
        <button class="modal-btn" onclick="closePopup()">OK</button>
    </div>
</div>

<script>

// SWITCH FORMS
function showRegister(){
document.getElementById("loginForm").style.display="none";
document.getElementById("registerForm").style.display="block";
document.getElementById("title").innerText="REGISTER";
}

function showLogin(){
document.getElementById("loginForm").style.display="block";
document.getElementById("registerForm").style.display="none";
document.getElementById("title").innerText="LOGIN";
}

// POPUP
function showPopup(title, text, color="#ff4655") {
document.getElementById("popupTitle").innerText = title;
document.getElementById("popupText").innerText = text;
document.getElementById("popupTitle").style.color = color;
document.getElementById("popup").style.display = "flex";
}

function closePopup() {
document.getElementById("popup").style.display = "none";
}

// REGISTER
function register(){
let user = document.getElementById("regUser").value;
let email = document.getElementById("regEmail").value;
let pass = document.getElementById("regPass").value;

if(user && email && pass){

// check duplicate username
if(localStorage.getItem(user)){
showPopup("ERROR", "Username already exists!", "#ff4655");
return;
}

// check duplicate email
for(let i = 0; i < localStorage.length; i++){
let key = localStorage.key(i);
let data = localStorage.getItem(key);

try {
let obj = JSON.parse(data);
if(obj.email === email){
showPopup("ERROR", "Email already registered!", "#ff4655");
return;
}
} catch(e) {
continue;
}
}

// save user
let data = {user,email,pass};
localStorage.setItem(user, JSON.stringify(data));

showPopup("SUCCESS", "Account Created Successfully!", "#00d4ff");
showLogin();

}else{
showPopup("FAILED", "Please fill all fields", "#ff4655");
}
}
// LOGIN
function login(){
let user = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

let data = localStorage.getItem(user);

if(data){
let obj = JSON.parse(data);

if(obj.pass === pass){
showPopup("SUCCESS", "Login Successful!", "#00d4ff");

localStorage.setItem("currentUser", user);

setTimeout(()=>{
window.location.href="web.html";
},1500);

}else{
showPopup("ERROR", "Wrong Password", "#ff4655");
}

}else{
showPopup("ERROR", "Account not found", "#ff4655");
}
}

</script>

</body>
</html>
